# Spring Boot Optimization for Faster Startup
spring.application.name=employee-monitoring-system
server.port=8080

# Faster Startup - Disable unnecessary features
spring.jpa.defer-datasource-initialization=false
spring.jpa.show-sql=false

# Database Configuration (H2 - Fast in-memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration - Optimized
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable unnecessary startup checks
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging - Minimal for faster startup
logging.level.root=WARN
logging.level.com.example.employeemonitoring=INFO
logging.level.org.springframework.boot=WARN
logging.level.org.hibernate=WARN

# Server optimization
server.compression.enabled=true
server.compression.min-response-size=1024
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# Async logging for better performance
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
