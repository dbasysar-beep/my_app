# Spring Boot Configuration
spring.application.name=employee-monitoring-system
server.port=8080

# Database Configuration (H2 for local development)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.employeemonitoring=DEBUG

# Firebase Configuration (if using Firebase)
# firebase.database-url=YOUR_FIREBASE_URL
# firebase.project-id=YOUR_PROJECT_ID
# firebase.api-key=YOUR_API_KEY
